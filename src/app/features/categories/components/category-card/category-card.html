<article class="category-card" [class.category-card--alphabetical]="isAlphabeticalMode()">
  @if (isAlphabeticalMode()) {
    <h4 class="category-card__group">{{ category().group?.name }}</h4>
  }

  <h4 class="category-card__title">{{ category().wording }}</h4>
  <p class="category-card__description">
    {{ category().description || 'Aucune description' }}
  </p>
</article>
